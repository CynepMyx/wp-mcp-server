name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare release files
        run: |
          mkdir -p release
          cp -r dist/ release/dist/
          cp package.json release/
          cp package-lock.json release/
          cp .env.example release/
          cp README.md release/
          cp LICENSE release/

      - name: Create tar.gz
        run: |
          cd release
          tar -czf ../wordpress-mcp-server-v${{ steps.version.outputs.VERSION }}.tar.gz .

      - name: Create zip
        run: |
          cd release
          zip -r ../wordpress-mcp-server-v${{ steps.version.outputs.VERSION }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            wordpress-mcp-server-v${{ steps.version.outputs.VERSION }}.tar.gz
            wordpress-mcp-server-v${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
